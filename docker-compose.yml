version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: buddget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
    environment:
      PORT: 4072
    ports:
      - "4072:4072"
    depends_on:
      - db

volumes:
  pgdata:
