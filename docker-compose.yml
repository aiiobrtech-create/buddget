version: "3.9"

# ATENÇÃO: o serviço `db` é só para desenvolvimento local (profile local-db).
# Em VPS/produção, NÃO use Postgres local — aponte DATABASE_URL/DIRECT_URL ao Session pooler
# (*.pooler.supabase.com:5432) ou defina SUPABASE_POOLER_HOST no .env.

services:
  db:
    image: postgres:16
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: buddget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
    environment:
      PORT: 4072
      NODE_ENV: production
    ports:
      - "4072:4072"

volumes:
  pgdata:
