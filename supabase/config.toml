# BUDDGET — Supabase local / link ao projeto remoto
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "buddget"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:4070"
additional_redirect_urls = ["http://localhost:4070/**"]
